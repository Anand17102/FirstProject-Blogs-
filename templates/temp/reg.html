{%extends "temp/main.html"%}
{%block content%}
<div class="container">
<form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
  {%csrf_token%}
  <div class="mb-3">
    <h2>Register</h2>
    {% if messages %}
<ul class="messages w-100">
  <div class="alert alert-info  w-100" role="alert">
    {% for message in messages %}
    <li {% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
    {% endfor %}
</div>
    
</ul>
{% endif %}

  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">First name</label>
    <input type="text" class="form-control" name="first_name" id="exampleInputPassword1">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Last name</label>
    <input type="text" class="form-control" name="last_name" id="exampleInputPassword1">
  </div>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Username</label>
    <input type="text" class="form-control" id="exampleInputEmail1" name="username" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" name="password" id="exampleInputPassword1">
  </div>
    <p>Already have account <a href="/log/">Login</a></p>
  <button type="submit" class="btn btn-primary mb-3 w-100">Submit</button>
</form>
</div>

{%endblock%}
